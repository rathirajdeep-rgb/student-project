<!DOCTYPE html>
<html>
<head>
    <title>Student Marks Predictor</title>
    <!--Bootstrap CDN -->
    <link
   href = "https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="big-light">
<div class="container mt-5">
    <div class="card shadow p-4">
        <h2 class = "text-container mb-4"> Student Marks Predictor</h2>
        <form action = "/predict" method = "post">
            <div class = "mb-3">
                <label class = "form-label"> Age</label>
                <input type = "number" name="age" class = "form-control" required>
            </div>
            <div class = "mb-3">
                <label class = "form-label"> Study Hours</label>
                <input type = "number" name="study_hours" class = "form-control" required>
            </div>
            <div class = "mb-3">
                <label class = "form-label"> Attendance</label>
                <input type = "number" name="attendance" class = "form-control" required>
            </div>
            <div class = "mb-3">
                <label class = "form-label"> Sleep Hours</label>
                <input type = "number" name="sleep_hours" class = "form-control" required>
            </div>
            <div class = "d-grid">
               <button type = "submit" class = "btn btn-primary">Predict</button>
            </div>
        </form>

        {% if prediction_text %}
            <div class = "mt-4 text-center">
              <h4>{{prediction_text}}</h4>
            </div>
        {% endif %}
    </div>
</div>
</body>
</html>
